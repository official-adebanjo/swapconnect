---
deployment:
  tasks:
    # IMPORTANT: Replace 'your_cpanel_user' and 'your_app_root' with the
    # actual path from your cPanel Node.js App setup.
    # Example: /home/swapconn/swapconnect_app
    - export DEPLOYPATH=/home/frwzozxi/swapconnect

    # Task 1: Install all monorepo dependencies from the root using Yarn.
    # Your project uses Yarn workspaces, so 'yarn install' must be run from the root.
    - echo "Step 1: Installing monorepo dependencies..."
    - cd ${REPO_PATH} && yarn install --frozen-lockfile

    # Task 2: Build the entire project using Turborepo.
    # This will correctly build the 'frontend' app.
    - echo "Step 2: Building project with Turborepo..."
    - cd ${REPO_PATH} && yarn build

    # Task 2.5: Prepare standalone directory structure
    # Copy the custom server.js to the standalone root
    - cp ${REPO_PATH}server.js ${REPO_PATH}apps/frontend/.next/standalone/server.js
    # Ensure static assets are in the correct location for the nested server/app
    - mkdir -p ${REPO_PATH}apps/frontend/.next/standalone/apps/frontend/.next/static
    - cp -r ${REPO_PATH}apps/frontend/.next/static/* ${REPO_PATH}apps/frontend/.next/standalone/apps/frontend/.next/static/
    - mkdir -p ${REPO_PATH}apps/frontend/.next/standalone/apps/frontend/public
    - cp -r ${REPO_PATH}apps/frontend/public/* ${REPO_PATH}apps/frontend/.next/standalone/apps/frontend/public/

    # Task 3: Copy the standalone build output to the deployment directory.
    # The output is located in apps/frontend/.next/standalone.
    # The 'rsync' command efficiently syncs the files, deleting old ones.
    - echo "Step 3: Deploying files to ${DEPLOYPATH}..."
    - /bin/rsync -a --delete ${REPO_PATH}apps/frontend/.next/standalone/ ${DEPLOYPATH}

    # Task 4: Restart the Phusion Passenger service for the Node.js app.
    - echo "Step 4: Restarting Node.js application..."
    - /sbin/passenger-config restart-app ${DEPLOYPATH}
